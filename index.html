<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENAI Hub | Inovação e Tecnologia</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--cyan:#00e7ff;--blue:#006dff;--orange:#ff6a00;--dark:#020817;--panel:#061426}
    body{min-height:100vh;background:#020817;font-family:Arial,Helvetica,sans-serif;color:#fff;overflow:hidden}
    .vitrine{position:relative;width:100vw;height:100vh;padding:18px 24px;background:radial-gradient(circle at 15% 15%,rgba(0,229,255,.28),transparent 24%),radial-gradient(circle at 85% 18%,rgba(0,85,255,.30),transparent 28%),radial-gradient(circle at 85% 88%,rgba(255,106,0,.14),transparent 30%),linear-gradient(135deg,#01040d 0%,#06152f 48%,#020817 100%);overflow:hidden}
    .vitrine::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(0,231,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(0,231,255,.07) 1px,transparent 1px);background-size:54px 54px;opacity:.45;animation:grid 22s linear infinite}.vitrine::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 0 45%,rgba(0,231,255,.12) 50%,transparent 55%);animation:shine 6s linear infinite;pointer-events:none}@keyframes grid{to{transform:translateY(54px)}}@keyframes shine{from{transform:translateX(-120%)}to{transform:translateX(120%)}}
    .top{position:relative;z-index:5;height:86px;display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(0,231,255,.28);border-bottom:none;border-radius:22px 22px 0 0;padding:14px 28px;background:linear-gradient(90deg,rgba(1,10,25,.75),rgba(5,20,50,.35));box-shadow:0 0 34px rgba(0,231,255,.20)}
    .brand-title{font-weight:800;letter-spacing:5px;text-transform:uppercase;color:#9cf8ff;font-size:clamp(.8rem,1.6vw,1.15rem)}.brand-title b{color:var(--cyan)}
    .logo-box{height:68px;min-width:265px;padding:8px 16px;border:1px solid rgba(0,231,255,.65);border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,.96),rgba(230,250,255,.90));box-shadow:0 0 28px rgba(0,231,255,.52),inset 0 0 18px rgba(0,109,255,.18);clip-path:polygon(8% 0,100% 0,92% 100%,0 100%,0 22%)}.logo-box img{width:100%;height:100%;object-fit:contain;display:block}
    .stage{position:relative;z-index:3;height:calc(100vh - 178px);border:2px solid rgba(0,231,255,.55);border-radius:0 0 24px 24px;background:linear-gradient(135deg,rgba(2,8,23,.80),rgba(5,25,55,.54));box-shadow:0 0 32px rgba(0,231,255,.32),inset 0 0 52px rgba(0,109,255,.23);overflow:hidden}.stage::before{content:"";position:absolute;inset:18px;border:1px solid rgba(0,231,255,.35);border-radius:20px;pointer-events:none;box-shadow:inset 0 0 24px rgba(0,231,255,.18)}
    .slide{position:absolute;inset:0;opacity:0;transform:scale(1.02);transition:opacity 1s ease,transform 4.5s ease}.slide.active{opacity:1;transform:scale(1);z-index:2}.slide img{width:100%;height:100%;object-fit:cover;display:block;filter:contrast(1.05) saturate(1.12) brightness(.95)}
    .slide::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(2,8,23,.12),transparent 38%,rgba(2,8,23,.08)),linear-gradient(0deg,rgba(2,8,23,.26),transparent 26%,rgba(2,8,23,.18));pointer-events:none}.corner{position:absolute;z-index:6;width:110px;height:110px;border-color:var(--cyan);opacity:.95}.c1{top:14px;left:14px;border-top:4px solid;border-left:4px solid;border-radius:18px 0 0 0}.c2{top:14px;right:14px;border-top:4px solid;border-right:4px solid;border-radius:0 18px 0 0}.c3{bottom:14px;left:14px;border-bottom:4px solid;border-left:4px solid;border-radius:0 0 0 18px}.c4{bottom:14px;right:14px;border-bottom:4px solid;border-right:4px solid;border-radius:0 0 18px 0}
    .nav{position:absolute;top:50%;transform:translateY(-50%);z-index:10;width:58px;height:58px;border-radius:50%;border:1px solid rgba(0,231,255,.72);background:rgba(1,13,31,.78);color:#fff;font-size:38px;cursor:pointer;box-shadow:0 0 24px rgba(0,231,255,.42);display:grid;place-items:center}.nav:hover{background:rgba(0,231,255,.18)}.prevBtn{left:22px}.nextBtn{right:22px}
    .dots{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);z-index:10;display:flex;gap:13px;padding:10px 18px;border:1px solid rgba(0,231,255,.28);border-radius:30px;background:rgba(2,8,23,.45);backdrop-filter:blur(6px)}.dot{width:12px;height:12px;border-radius:50%;border:1px solid var(--cyan);background:transparent;box-shadow:0 0 10px rgba(0,231,255,.45)}.dot.active{background:var(--cyan);box-shadow:0 0 18px var(--cyan)}
    .bottom{position:relative;z-index:5;margin-top:14px;height:62px;display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.info{display:flex;align-items:center;justify-content:center;gap:12px;border:1px solid rgba(0,231,255,.28);border-radius:14px;background:linear-gradient(135deg,rgba(2,8,23,.76),rgba(0,47,91,.38));box-shadow:0 0 22px rgba(0,231,255,.14);text-transform:uppercase;letter-spacing:1.4px;font-size:.88rem}.info span{font-size:1.5rem;color:var(--cyan)}.info strong{display:block;color:#fff}.info small{display:block;color:#b7efff;margin-top:2px}
    .progress{position:absolute;left:0;bottom:0;height:5px;background:linear-gradient(90deg,var(--cyan),var(--blue),var(--orange));z-index:20;width:0%;animation:progress 5.5s linear infinite}@keyframes progress{from{width:0}to{width:100%}}
    @media(max-width:900px){.vitrine{padding:10px}.top{height:74px;padding:10px 14px}.brand-title{letter-spacing:2px;font-size:.75rem}.logo-box{min-width:150px;height:50px}.stage{height:calc(100vh - 150px)}.slide img{object-fit:contain;background:#020817}.bottom{display:none}.nav{width:46px;height:46px;font-size:30px}.dots{bottom:12px;gap:8px}.dot{width:9px;height:9px}}
  </style>
</head>
<body>
  <main class="vitrine">
    <header class="top">
      <div class="brand-title"><b>SENAI HUB</b> &nbsp; Inovação e Tecnologia</div>
      <div class="logo-box"><img src="assets/senai-hub-logo.png" alt="SENAI Hub"></div>
    </header>

    <section class="stage" id="stage">
      <div class="corner c1"></div><div class="corner c2"></div><div class="corner c3"></div><div class="corner c4"></div>
      <button class="nav prevBtn" aria-label="Slide anterior">‹</button>
      <button class="nav nextBtn" aria-label="Próximo slide">›</button>

      <article class="slide active"><img src="assets/manutencao-eletrica.png" alt="Manutenção Elétrica"></article>
      <article class="slide"><img src="assets/acionamentos-eletricos.png" alt="Acionamentos Elétricos"></article>
      <article class="slide"><img src="assets/clp-siemens.png" alt="CLP Siemens"></article>
      <article class="slide"><img src="assets/ihm-siemens.png" alt="IHM Siemens"></article>
      <article class="slide"><img src="assets/comandos-eletricos.png" alt="Comandos Elétricos"></article>
      <article class="slide"><img src="assets/redes-industriais.png" alt="Redes Industriais"></article>
      <article class="slide"><img src="assets/seguranca-maquinas-nr12.png" alt="Segurança de Máquinas NR-12"></article>
      <article class="slide"><img src="assets/industria-4-0-factoryio.png" alt="Indústria 4.0 e Factory I/O"></article>
      <article class="slide"><img src="assets/iot-industrial-lorawan.png" alt="IoT Industrial e LoRaWAN"></article>
      <article class="slide"><img src="assets/energias-renovaveis.png" alt="Energias Renováveis"></article>
      <article class="slide"><img src="assets/fotovoltaico.png" alt="Energia Fotovoltaica"></article>

      <div class="dots" id="dots"></div>
      <div class="progress" id="progress"></div>
    </section>

    <footer class="bottom">
      <div class="info"><span>🧠</span><div><strong>Inovação</strong><small>que transforma</small></div></div>
      <div class="info"><span>🌐</span><div><strong>Tecnologia</strong><small>que conecta</small></div></div>
      <div class="info"><span>📈</span><div><strong>Educação</strong><small>que desenvolve</small></div></div>
      <div class="info"><span>🛡</span><div><strong>Segurança</strong><small>que garante</small></div></div>
      <div class="info"><span>🎯</span><div><strong>Futuro</strong><small>que construímos</small></div></div>
    </footer>
  </main>

  <script>
    const slides = [...document.querySelectorAll('.slide')];
    const dotsWrap = document.getElementById('dots');
    const progress = document.getElementById('progress');
    const nextBtn = document.querySelector('.nextBtn');
    const prevBtn = document.querySelector('.prevBtn');
    let current = 0;
    let timer;
    const delay = 5500;

    slides.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('aria-label', 'Abrir slide ' + (i + 1));
      dot.onclick = () => goTo(i);
      dotsWrap.appendChild(dot);
    });
    const dots = [...document.querySelectorAll('.dot')];

    function resetProgress(){
      progress.style.animation = 'none';
      void progress.offsetWidth;
      progress.style.animation = 'progress ' + (delay/1000) + 's linear infinite';
    }
    function goTo(index){
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = (index + slides.length) % slides.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
      resetProgress();
      clearInterval(timer);
      timer = setInterval(next, delay);
    }
    function next(){goTo(current + 1)}
    function prev(){goTo(current - 1)}
    nextBtn.onclick = next;
    prevBtn.onclick = prev;
    timer = setInterval(next, delay);
  </script>
</body>
</html>
